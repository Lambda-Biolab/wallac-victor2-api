# Quality gates for the maintained agent stack (docs/102). Install with:
#   uvx pre-commit install --hook-type pre-commit --hook-type commit-msg
# Run on demand:  make validate
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: complexipy
        name: complexipy (cognitive <=15, agent stack)
        entry: complexipy -mx 15
        language: system
        files: ^vm-agent/(agent|lid_watcher|launch_as_user)\.py$
        pass_filenames: true

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
