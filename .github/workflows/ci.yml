name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install tools and test dependencies
        run: |
          uv pip install --system \
            ruff \
            complexipy \
            pytest \
            fastapi \
            httpx \
            pydantic \
            pynacl

      - name: Validate (lint + format-check + complexity + tests)
        run: make validate
